<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Planning Atelier UIMM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --uimm-blue:#005B84;
  --uimm-red:#E30613;
  --dark:#102033;
  --bg:#F5F7FA;
  --card:#FFFFFF;
  --border:#D8DEE6;
  --text:#122033;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--text);
}

.login{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,var(--uimm-blue),#00384F);
}

.login-card{
  width:360px;
  background:white;
  padding:30px;
  border-radius:18px;
  box-shadow:0 20px 50px #0004;
}

.logo-box{
  background:var(--uimm-blue);
  color:white;
  padding:20px;
  text-align:center;
  font-size:42px;
  font-weight:bold;
  letter-spacing:4px;
}

.logo-red{
  background:var(--uimm-red);
  color:white;
  text-align:center;
  padding:10px;
  font-size:16px;
  margin-bottom:20px;
}

input,select,textarea,button{
  width:100%;
  padding:11px;
  margin-top:8px;
  border-radius:9px;
  border:1px solid var(--border);
  font-size:15px;
}

button{
  border:0;
  font-weight:bold;
  cursor:pointer;
}

.btn{background:var(--uimm-blue);color:white}
.btn-red{background:var(--uimm-red);color:white}
.btn-light{background:#E9EEF3;color:var(--dark)}

header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:white;
  padding:14px 24px;
  box-shadow:0 3px 15px #0001;
}

.brand{
  display:flex;
  align-items:center;
  gap:16px;
}

.logo{
  width:110px;
}

.logo .top{
  background:var(--uimm-blue);
  color:white;
  font-size:32px;
  font-weight:bold;
  letter-spacing:4px;
  padding:8px;
  text-align:center;
}

.logo .bottom{
  background:var(--uimm-red);
  color:white;
  font-size:11px;
  text-align:center;
  padding:6px;
}

.actions{
  display:flex;
  gap:10px;
}

.actions button{width:auto}

main{padding:22px}

.toolbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:18px;
}

.toolbar button{width:auto}

.card{
  background:white;
  border-radius:18px;
  padding:22px;
  box-shadow:0 8px 25px #0001;
}

.table-wrap{
  overflow:auto;
  max-height:72vh;
}

table{
  border-collapse:collapse;
  width:100%;
  min-width:1050px;
}

th{
  background:var(--uimm-blue);
  color:white;
  position:sticky;
  top:0;
  z-index:2;
}

th,td{
  border:1px solid var(--border);
  padding:9px;
  text-align:center;
  height:62px;
}

th:first-child,
td:first-child{
  position:sticky;
  left:0;
  z-index:3;
  background:#EDF2F6;
  color:var(--dark);
  font-weight:bold;
  width:120px;
}

.resa{
  color:white;
  font-weight:bold;
  border-radius:10px;
  padding:7px;
  cursor:pointer;
  min-height:42px;
}

.comment{
  font-size:11px;
  margin-top:4px;
  opacity:.95;
}

.empty{
  cursor:pointer;
  background:#fff;
}

.empty:hover{
  background:#eef7fb;
}

.drawer{
  position:fixed;
  right:-400px;
  top:0;
  width:380px;
  height:100vh;
  background:white;
  z-index:20;
  padding:22px;
  box-shadow:-8px 0 30px #0003;
  transition:.25s;
  overflow:auto;
}

.drawer.open{right:0}

label{
  display:block;
  font-weight:bold;
  margin-top:13px;
}

.msg{
  font-weight:bold;
  margin-top:14px;
}

.class-row{
  display:grid;
  grid-template-columns:20px 1fr 42px;
  gap:8px;
  align-items:center;
  margin-top:10px;
}

.dot{
  width:16px;
  height:16px;
  border-radius:50%;
}

.hidden{display:none}

@media(max-width:900px){
  header{flex-direction:column;align-items:flex-start;gap:12px}
  .drawer{width:92%;right:-100%}
}
</style>
</head>

<body>

<div id="loginPage" class="login">
  <div class="login-card">
    <div class="logo-box">UIMM</div>
    <div class="logo-red">LA FABRIQUE DE L’AVENIR</div>

    <h2>Connexion Admin</h2>

    <label>Identifiant</label>
    <input id="loginUser" placeholder="Admin">

    <label>Mot de passe</label>
    <input id="loginPass" type="password" placeholder="Admin">

    <button class="btn" onclick="connexion()">Se connecter</button>
    <p id="loginMsg" class="msg"></p>
  </div>
</div>

<div id="app" class="hidden">

<header>
  <div class="brand">
    <div class="logo">
      <div class="top">UIMM</div>
      <div class="bottom">LA FABRIQUE<br>DE L’AVENIR</div>
    </div>
    <div>
      <h1>Planning Atelier</h1>
      <p>Réservation des zones A à K</p>
    </div>
  </div>

  <div class="actions">
    <button class="btn" onclick="ouvrirMenu('reservation')">Ajouter</button>
    <button class="btn-light" onclick="ouvrirMenu('classes')">Classes</button>
    <button class="btn-red" onclick="deconnexion()">Déconnexion</button>
  </div>
</header>

<main>
  <div class="toolbar">
    <button class="btn-light" onclick="changerJour(-1)">← Jour précédent</button>
    <button class="btn" onclick="aujourdhui()">Aujourd’hui</button>
    <button class="btn-light" onclick="changerJour(1)">Jour suivant →</button>
    <button class="btn-light" onclick="changerJour(-7)">← Semaine précédente</button>
    <button class="btn-light" onclick="changerJour(7)">Semaine suivante →</button>
  </div>

  <div class="card">
    <h2 id="titreJour"></h2>
    <div class="table-wrap">
      <table id="planning"></table>
    </div>
  </div>
</main>

<div id="drawer" class="drawer">
  <button class="btn-red" onclick="fermerMenu()">Fermer</button>

  <div id="menuReservation">
    <h2>Réservation</h2>

    <label>Date</label>
    <input type="date" id="dateInput">

    <label>Horaire</label>
    <select id="horaireInput"></select>

    <label>Zone</label>
    <select id="zoneInput"></select>

    <label>Classe</label>
    <select id="classeInput"></select>

    <label>Commentaire</label>
    <textarea id="commentaireInput" placeholder="Ajouter un commentaire..."></textarea>

    <button class="btn" onclick="ajouterReservation()">Valider</button>
    <button class="btn-red" onclick="supprimerReservation()">Supprimer la réservation sélectionnée</button>

    <p id="message" class="msg"></p>
  </div>

  <div id="menuClasses" class="hidden">
    <h2>Gestion des classes</h2>

    <label>Nouvelle classe</label>
    <input id="newClassInput" placeholder="Nom de classe">

    <label>Couleur</label>
    <input type="color" id="newColorInput" value="#005B84">

    <button class="btn" onclick="ajouterClasse()">Ajouter la classe</button>

    <div id="listeClasses"></div>
  </div>
</div>

</div>

<script>
const horaires=[
"08h-09h","09h-10h","10h-11h","11h-12h",
"13h-14h","14h-15h","15h-16h","16h-17h"
];

const zones=[
"Zone A","Zone B","Zone C","Zone D","Zone E","Zone F",
"Zone G","Zone H","Zone I","Zone J","Zone K"
];

let classes=JSON.parse(localStorage.getItem("classes"))||[
{nom:"BacPro MELEC",couleur:"#005B84"},
{nom:"BTS MS SP",couleur:"#E30613"},
{nom:"BTS ELT",couleur:"#0077A3"},
{nom:"BTS SEF",couleur:"#EF7D00"},
{nom:"LPro CAPPI",couleur:"#6F2DBD"},
{nom:"LPro MSI",couleur:"#008C72"},
{nom:"Région TMI",couleur:"#7A9A01"},
{nom:"CPro TMI",couleur:"#C2410C"},
{nom:"TSMI Dreyfus",couleur:"#334155"},
{nom:"IFTI",couleur:"#0F766E"}
];

let reservations=JSON.parse(localStorage.getItem("reservations"))||[];
let dateCourante=new Date();
let selection=null;

function connexion(){
  const u=document.getElementById("loginUser").value;
  const p=document.getElementById("loginPass").value;

  if(u==="Admin" && p==="Admin"){
    localStorage.setItem("connecte","oui");
    afficherApp();
  }else{
    loginMsg.textContent="Identifiant ou mot de passe incorrect.";
    loginMsg.style.color="#E30613";
  }
}

function deconnexion(){
  localStorage.removeItem("connecte");
  location.reload();
}

function afficherApp(){
  loginPage.classList.add("hidden");
  app.classList.remove("hidden");
  init();
}

if(localStorage.getItem("connecte")==="oui"){
  afficherApp();
}

function save(){
  localStorage.setItem("classes",JSON.stringify(classes));
  localStorage.setItem("reservations",JSON.stringify(reservations));
}

function iso(d){
  return new Date(d).toISOString().split("T")[0];
}

function belleDate(d){
  return new Date(d).toLocaleDateString("fr-FR",{
    weekday:"long",
    day:"2-digit",
    month:"2-digit",
    year:"numeric"
  }).replace(/^./,c=>c.toUpperCase());
}

function msg(t,c){
  message.textContent=t;
  message.style.color=c;
}

function ouvrirMenu(type){
  drawer.classList.add("open");

  if(type==="reservation"){
    menuReservation.classList.remove("hidden");
    menuClasses.classList.add("hidden");
  }else{
    menuReservation.classList.add("hidden");
    menuClasses.classList.remove("hidden");
  }
}

function fermerMenu(){
  drawer.classList.remove("open");
}

function remplirMenus(){
  horaireInput.innerHTML=horaires.map(h=>`<option>${h}</option>`).join("");
  zoneInput.innerHTML=zones.map(z=>`<option>${z}</option>`).join("");
  classeInput.innerHTML=classes.map(c=>`<option>${c.nom}</option>`).join("");
}

function afficherClasses(){
  listeClasses.innerHTML="";

  classes.forEach(c=>{
    const div=document.createElement("div");
    div.className="class-row";
    div.innerHTML=`
      <span class="dot" style="background:${c.couleur}"></span>
      <strong>${c.nom}</strong>
      <button class="btn-red">X</button>
    `;

    div.querySelector("button").onclick=()=>{
      if(reservations.some(r=>r.classe===c.nom)){
        msg("Impossible de supprimer : cette classe a déjà des réservations.","#E30613");
        return;
      }

      classes=classes.filter(x=>x.nom!==c.nom);
      save();
      remplirMenus();
      afficherClasses();
      afficherPlanning();
    };

    listeClasses.appendChild(div);
  });
}

function ajouterClasse(){
  const nom=newClassInput.value.trim();
  const couleur=newColorInput.value;

  if(!nom){
    msg("Nom de classe obligatoire.","#E30613");
    return;
  }

  if(classes.some(c=>c.nom.toLowerCase()===nom.toLowerCase())){
    msg("Cette classe existe déjà.","#E30613");
    return;
  }

  classes.push({nom,couleur});
  newClassInput.value="";
  save();
  remplirMenus();
  afficherClasses();
  afficherPlanning();
  msg("Classe ajoutée.","green");
}

function changerJour(nb){
  dateCourante.setDate(dateCourante.getDate()+nb);
  dateInput.value=iso(dateCourante);
  afficherPlanning();
}

function aujourdhui(){
  dateCourante=new Date();
  dateInput.value=iso(dateCourante);
  afficherPlanning();
}

function ajouterReservation(){
  const date=dateInput.value;
  const horaire=horaireInput.value;
  const zone=zoneInput.value;
  const classe=classeInput.value;
  const commentaire=commentaireInput.value.trim();

  const conflit=reservations.find(r=>
    r.date===date && r.horaire===horaire && r.zone===zone
  );

  if(conflit && conflit.id!==selection){
    msg(`Erreur : ${zone} est déjà réservée par ${conflit.classe} le ${belleDate(date)} ${horaire}.`,"#E30613");
    return;
  }

  if(selection){
    const r=reservations.find(x=>x.id===selection);
    r.date=date;
    r.horaire=horaire;
    r.zone=zone;
    r.classe=classe;
    r.commentaire=commentaire;
    msg("Réservation modifiée.","green");
  }else{
    reservations.push({
      id:Date.now(),
      date,
      horaire,
      zone,
      classe,
      commentaire
    });
    msg("Réservation ajoutée.","green");
  }

  dateCourante=new Date(date);
  selection=null;
  save();
  afficherPlanning();
}

function supprimerReservation(){
  if(!selection){
    msg("Clique d’abord sur une réservation.","#E30613");
    return;
  }

  reservations=reservations.filter(r=>r.id!==selection);
  selection=null;
  save();
  afficherPlanning();
  msg("Réservation supprimée.","green");
}

function preRemplir(date,horaire,zone){
  selection=null;
  dateInput.value=date;
  horaireInput.value=horaire;
  zoneInput.value=zone;
  commentaireInput.value="";
  ouvrirMenu("reservation");
}

function selectionner(id){
  const r=reservations.find(x=>x.id===id);
  selection=id;

  dateInput.value=r.date;
  horaireInput.value=r.horaire;
  zoneInput.value=r.zone;
  classeInput.value=r.classe;
  commentaireInput.value=r.commentaire||"";

  ouvrirMenu("reservation");
  msg("Réservation sélectionnée.","green");
}

function afficherPlanning(){
  const date=iso(dateCourante);
  titreJour.textContent=belleDate(date);

  let html="<tr><th>Zone / Horaire</th>";

  horaires.forEach(h=>{
    html+=`<th>${h}</th>`;
  });

  html+="</tr>";

  zones.forEach(z=>{
    html+=`<tr><td>${z}</td>`;

    horaires.forEach(h=>{
      const r=reservations.find(x=>x.date===date && x.horaire===h && x.zone===z);

      if(r){
        const c=classes.find(x=>x.nom===r.classe)||{couleur:"#555"};
        html+=`
          <td>
            <div class="resa" style="background:${c.couleur}" onclick="selectionner(${r.id})" title="${r.commentaire||''}">
              ${r.classe}
              ${r.commentaire ? `<div class="comment">${r.commentaire}</div>` : ""}
            </div>
          </td>
        `;
      }else{
        html+=`<td class="empty" onclick="preRemplir('${date}','${h}','${z}')"></td>`;
      }
    });

    html+="</tr>";
  });

  planning.innerHTML=html;
}

function init(){
  dateInput.value=iso(dateCourante);
  remplirMenus();
  afficherClasses();
  afficherPlanning();

  dateInput.addEventListener("change",()=>{
    dateCourante=new Date(dateInput.value);
    afficherPlanning();
  });
}
</script>

</body>
</html>
